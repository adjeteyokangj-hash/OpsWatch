name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: ci-opswatch-jwt-secret-for-github-actions-32
      RUN_DATABASE_E2E: "false"
      RUN_BROWSER_E2E: "false"
      OPSWATCH_WEB_URL: http://localhost:3000
      NEXT_PUBLIC_OPSWATCH_API_URL: http://localhost:4000/api
      WORKER_INTERNAL_SECRET: ci-worker-internal-secret
      INGEST_SIGNING_REQUIRED: "true"
      SESSION_SIGNING_REQUIRED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce no automatic database migration
        run: node scripts/assert-no-automatic-migrations.mjs

      - name: Generate Prisma client
        run: pnpm --filter @opswatch/api exec prisma generate

      - name: Build shared package
        run: pnpm --filter @opswatch/shared build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests only
        run: pnpm test
        env:
          NODE_ENV: test
          RUN_DATABASE_E2E: "false"
          RUN_BROWSER_E2E: "false"

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm -r --if-present test

      - name: Install Playwright browsers
        if: env.RUN_BROWSER_E2E == 'true'
        run: pnpm --filter @opswatch/web exec playwright install chromium

      - name: Browser E2E
        if: env.RUN_BROWSER_E2E == 'true'
        run: pnpm --filter @opswatch/web test:e2e:automation
        env:
          RUN_BROWSER_E2E: "true"

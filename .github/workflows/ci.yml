name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/opswatch?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/opswatch?schema=public
      JWT_SECRET: ci-opswatch-jwt-secret-for-github-actions-32
      RUN_DATABASE_E2E: "false"
      RUN_BROWSER_E2E: "false"
      OPSWATCH_WEB_URL: http://localhost:3000
      NEXT_PUBLIC_OPSWATCH_API_URL: http://localhost:4000/api
      WORKER_INTERNAL_SECRET: ci-worker-internal-secret
      INGEST_SIGNING_REQUIRED: "true"
      SESSION_SIGNING_REQUIRED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce no automatic database migration
        run: node scripts/assert-no-automatic-migrations.mjs

      - name: Generate Prisma client
        run: pnpm --filter @opswatch/api exec prisma generate

      - name: Build shared package
        run: pnpm --filter @opswatch/shared build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: |
          set +e
          pnpm typecheck 2>&1 | tee typecheck.log
          exit ${PIPESTATUS[0]}

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Affected API regression tests
        run: >-
          pnpm --filter @opswatch/api exec vitest run --config vitest.config.ts
          'src/controllers/auth.logout.test.ts'
          'src/lib/session-cookie.test.ts'
          'src/services/worker-tick/serverless-tick.service.test.ts'
          'src/services/worker-tick/worker-runtime-status.service.test.ts'
          'src/services/learning/learning-cycle.service.test.ts'

      - name: Affected web regression tests
        run: >-
          pnpm --filter @opswatch/web exec vitest run --config vitest.config.ts
          'src/components/auth/logout-button.test.tsx'
          'src/app/projects/[projectId]/billing/page.test.tsx'
          'src/lib/api.csrf.test.ts'
          'src/lib/auth.csrf.test.ts'

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
